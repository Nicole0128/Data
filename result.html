<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESULTS | THE 2016 COLLECTION</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&family=Noto+Sans+TC:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="padding-top: 60px;">
        <nav style="margin-bottom: 60px;">
            <a href="index.html" style="color: #000; text-decoration: none; font-size: 0.8rem; letter-spacing: 0.2em;">← RETURN TO ARCHIVE</a>
        </nav>

        <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #000; padding-bottom: 20px;">
            <h1 class="serif-font" style="margin: 0; font-size: 2.5rem;">The Results</h1>
            <div style="text-align: right;">
                <span style="font-size: 0.8rem; color: #888;">TOTAL ENTRIES</span><br>
                <span class="serif-font" style="font-size: 1.5rem;">261</span>
            </div>
        </div>

        <div style="margin: 40px 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
            <div style="background: var(--soft-gray); padding: 30px; text-align: center;">
                <small>平均募款金額</small><br><strong class="serif-font">NT$ 12.4M</strong>
            </div>
            <div style="background: var(--soft-gray); padding: 30px; text-align: center;">
                <small>企業捐贈佔比</small><br><strong class="serif-font">38.2%</strong>
            </div>
            <div style="background: var(--soft-gray); padding: 30px; text-align: center;">
                <small>最高單筆來源</small><br><strong class="serif-font">個人捐贈</strong>
            </div>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th class="serif-font">CANDIDATE 姓名</th>
                    <th class="serif-font">PARTY 政黨</th>
                    <th class="serif-font">DISTRICT 地區</th>
                    <th class="serif-font" style="text-align: right;">INCOME 總收入</th>
                    <th class="serif-font" style="text-align: right;">CORP % 企業比</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="serif-font" style="font-weight: bold;">柯建銘</td>
                    <td>民主進步黨</td>
                    <td>新竹市</td>
                    <td style="text-align: right;">51,641,147</td>
                    <td style="text-align: right;">52.12%</td>
                </tr>
                <tr>
                    <td class="serif-font" style="font-weight: bold;">吳秉叡</td>
                    <td>民主進步黨</td>
                    <td>新北市</td>
                    <td style="text-align: right;">50,205,014</td>
                    <td style="text-align: right;">41.75%</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>

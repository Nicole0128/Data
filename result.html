<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>THE ARCHIVE | 2016 COLLECTION</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="result-page">
    <div class="layout-wrapper">
        <aside class="filter-sidebar">
            <div class="brand">CHANEL <span style="font-size: 0.6rem;">POLITICS</span></div>
            <nav>
                <div class="filter-group">
                    <label>搜尋名稱</label>
                    <input type="text" id="search-q" oninput="applyFilters()" placeholder="Search...">
                </div>
                <div class="filter-group">
                    <label>推薦政黨</label>
                    <select id="filter-party" onchange="applyFilters()">
                        <option value="">全部政黨</option>
                        <option value="民主進步黨">民主進步黨</option>
                        <option value="中國國民黨">中國國民黨</option>
                        <option value="時代力量">時代力量</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>性別</label>
                    <select id="filter-gender" onchange="applyFilters()">
                        <option value="">全部</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>當選結果</label>
                    <select id="filter-elected" onchange="applyFilters()">
                        <option value="">全部</option>
                        <option value="是">當選者</option>
                        <option value="否">落選者</option>
                    </select>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <h1 class="serif-font">Collection Overview</h1>
                <div id="quick-summary" class="summary-line"></div>
            </header>

            <div class="viz-row">
                <div class="chart-container">
                    <canvas id="incomeChart"></canvas>
                    <div class="chart-label">收入結構分析</div>
                </div>
                <div class="info-card">
                    <h3 class="serif-font">趨勢洞察</h3>
                    <p>根據當前篩選條件，企業捐贈佔比呈現出顯著的城鄉差異...</p>
                </div>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>政黨</th>
                        <th>背景</th>
                        <th style="text-align:right;">總收入</th>
                        <th style="text-align:right;">狀態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="data-table-body"></tbody>
            </table>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>THE 2016 COLLECTION | 政治獻金查詢</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="hero">
            <div class="hero-subtitle">LEGISLATIVE ELECTION 2016</div>
            <h1>錢權的廓形</h1>
            <div class="search-container">
                <input type="text" id="main-search" class="search-input" placeholder="搜尋候選人名稱...">
                <button class="cta-button" onclick="handleSearch()">探索數據檔案</button>
            </div>
        </header>

        <section class="picks-section">
            <h2 style="text-align: center; margin-bottom: 60px;">Editor’s Picks</h2>
            <div class="grid">
                </div>
        </section>
    </div>

    <script>
        function handleSearch() {
            const val = document.getElementById('main-search').value;
            window.location.href = `result.html?q=${encodeURIComponent(val)}`;
        }
    </script>
</body>
</html>
